<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Preview - ThreadLab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        body {
            background: #f5f5f5;
            color: #111;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 60px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 999;
            width: 100%;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #111;
            font-weight: 600;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: #36aac7;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Menu Toggle Button Style */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            background: black;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Animate burger into an 'X' when active */
        .menu-toggle.active span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .btn {
            background: black;
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        /* Cart Link in Header */
        .cart-link {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .cart-count {
            background: crimson;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-section {
            padding: 80px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .main-image {
            width: 100%;
            max-width: 100%;
            height: 650px;
            object-fit: cover;
            border-radius: 30px;
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .thumbnail-container {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .thumbnail {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid transparent;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            border-color: black;
        }

        .product-info {
            background: white;
            padding: 50px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            width: 100%;
        }

        .badge {
            display: inline-block;
            background: crimson;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .product-info h1 {
            font-size: 54px;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .description {
            color: #666;
            line-height: 1.9;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .sizes,
        .colors {
            margin-bottom: 35px;
        }

        .sizes h3,
        .colors h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .size-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .size-btn {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .size-btn:hover,
        .size-btn.active {
            background: black;
            color: white;
            border-color: black;
        }

        .color-options {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .color:hover,
        .color.active {
            transform: scale(1.1);
            border-color: #36aac7;
        }

        .black {
            background: #4b3935;
        }

        .actions {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .wishlist-btn {
            background: #eee;
            color: black;
        }

        .wishlist-btn:hover {
            background: black;
            color: white;
        }

        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
        }

        .feature-box {
            background: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
        }

        .feature-box h1 {
            font-size: 40px;
        }

        .feature-box h3 {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        footer {
            padding: 40px 60px;
            border-top: 1px solid #ddd;
            background: white;
            text-align: center;
            width: 100%;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: black;
            color: white;
            padding: 16px 24px;
            border-radius: 14px;
            opacity: 0;
            transition: 0.4s;
            z-index: 9999;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(-10px);
        }

        /* Modal Overlay - স্ক্রিনের ঠিক মাঝখানে রাখার জন্য অ্যাডজাস্টমেন্ট */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            /* হরাইজন্টাল সেন্টার */
            align-items: center;
            /* ভার্টিক্যাল সেন্টার */
            padding: 20px;
        }

        /* Modal Content - স্ক্রলযোগ্য এবং রেসপন্সিভ সাইজ */
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            /* স্ক্রিনের উচ্চতা অনুযায়ী সর্বোচ্চ ৮৫% জায়গা নেবে */
            overflow-y: auto;
            /* কন্টেন্ট বেশি হলে মডালের ভেতরেই উপর-নিচ স্ক্রল হবে */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }

        .modal-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-right: 30px;
        }

        .clear-cart-btn {
            background: none;
            border: none;
            color: crimson;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: underline;
            transition: 0.2s;
        }

        .clear-cart-btn:hover {
            color: darkred;
        }

        .cart-item-list {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .checkout-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        /* Responsive Breakpoints compiled */
        @media(max-width: 1000px) {
            .product-section {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 40px 30px;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        @media(max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .product-section,
            footer {
                padding: 30px 20px;
            }

            .logo img {
                width: 170px;
                height: auto;
            }

            header>.btn {
                display: none;
            }

            .menu-toggle {
                display: flex;
            }

            nav {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                right: -100%;
                width: 250px;
                height: 100vh;
                background: white;
                box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
                padding: 100px 30px 30px 30px;
                gap: 25px;
                transition: 0.4s ease;
                z-index: 1000;
            }

            nav.show {
                right: 0;
            }

            .product-info {
                padding: 25px;
                border-radius: 25px;
            }

            .product-info h1 {
                font-size: 32px;
            }

            .price {
                font-size: 26px;
            }

            .main-image {
                height: 350px;
                border-radius: 24px;
            }

            .thumbnail {
                width: 70px;
                height: 70px;
            }

            .actions {
                flex-direction: column;
                position: static;
                padding-top: 10px;
            }

            .actions .btn {
                width: 100%;
                text-align: center;
            }

            /* মোবাইলে উইন্ডোটি পুরোপুরি সেন্টারে এবং স্ক্রলযোগ্য রাখার স্পেশাল রুলস */
            .modal-overlay {
                padding: 15px;
            }

            .modal-content {
                padding: 30px 20px 25px 20px;
                border-radius: 24px;
                max-height: 85vh;
                /* ছোট বা বড় যেকোনো ফোনেই স্ক্রিনের ভেতরে থাকবে */
            }

            .close-modal {
                top: 22px;
                right: 20px;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        .thumbnail.active {
            border: 3px solid black;
        }

        .main-image,
        .feature-box,
        .product-info,
        .btn,
        .size-btn,
        .color {
            transition: .3s ease;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon"><img src="logo2.png" alt="Boraldo" style="max-width: 100%; height: auto;" /></div>
        </div>

        <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="navMenu">
            <a href="../page1.html" onclick="closeMenu()">Home</a>
            <a href="../page1.html#collection" onclick="closeMenu()">Collection</a>
            <a href="page1.html#shop" onclick="closeMenu()">Shop</a>
            <a href="#" class="cart-link" onclick="openCartModal(); closeMenu();">Cart <span class="cart-count"
                    id="cartCountHeader">0</span></a>
        </nav>

        <a href="page1.html#shop" class="btn">Back To Store</a>
    </header>

    <section class="product-section">
        <div class="gallery">
            <img id="mainImage" src="1.jpg" class="main-image">
            <div class="thumbnail-container">
                            <img src="1.jpg" class="thumbnail active" onclick="changeImage(this)">

                <img src="1.png" class="thumbnail active" onclick="changeImage(this)">
            </div>
        </div>

        <div class="product-info">
            <div class="badge">Premium Collection</div>
            <h1 id="prodTitle">Boraldo Sweater Model-1
            </h1>
            <div class="price" id="prodPrice">$489</div>
            <p class="description">
                Premium heavyweight Sweater.
            </p>

            <div class="sizes">
                <h3>Size Available</h3>
                <div class="size-options">
                    <button class="size-btn active">L</button>
                    <button class="size-btn">XL</button>
                </div>
            </div>

            <div class="colors">
                <h3>Available Colors</h3>
                <div class="color-options">
                    <div class="color black active" data-color="Coffee Brown"></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn" onclick="addToCart()">Add To Cart</button>
                <button class="btn wishlist-btn" onclick="showToast('Added to wishlist')">❤ Wishlist</button>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="cartModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCartModal()">&times;</span>

            <div class="modal-header-container">
                <h2>Your Shopping Cart</h2>
                <button id="clearCartBtn" class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
            </div>

            <div class="cart-item-list" id="cartItemList">
            </div>

            <div style="margin-bottom: 20px; font-weight: bold; font-size: 18px;">
                Total: <span id="cartTotalPrice">$0.00</span>
            </div>

            <form class="checkout-form" id="paymentForm" onsubmit="processPayment(event)">
                <h3>Payment Details</h3>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="text" placeholder="Card Number (16 digits)" pattern="\d{16}" required>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="MM/YY" pattern="\d\d/\d\d" required>
                    <input type="text" placeholder="CVC" pattern="\d{3}" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Pay and Complete Order</button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // App State Storage Variables
        let selectedSize = "L";
        let selectedColor = "Coffee Brown";
        let cart = JSON.parse(localStorage.getItem('threadlab_cart')) || [];

        // Mobile Menu Functions
        function toggleMenu() {
            const nav = document.getElementById('navMenu');
            const toggleBtn = document.querySelector('.menu-toggle');
            nav.classList.toggle('show');
            toggleBtn.classList.toggle('active');
        }

        function closeMenu() {
            const nav = document.getElementById('navMenu');
            const toggleBtn = document.querySelector('.menu-toggle');
            nav.classList.remove('show');
            toggleBtn.classList.remove('active');
        }

        // Dynamic State Initializers
        document.addEventListener("DOMContentLoaded", () => {
            updateCartUI();

            // Set up configurations for variants
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedSize = btn.innerText;
                });
            });

            document.querySelectorAll('.color').forEach(clr => {
                clr.addEventListener('click', () => {
                    document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
                    clr.classList.add('active');
                    selectedColor = clr.getAttribute('data-color') || "Coffee Brown";
                });
            });
        });

        function changeImage(element) {
            document.getElementById('mainImage').src = element.src;
            document.querySelectorAll('.thumbnail').forEach(thumb => thumb.classList.remove('active'));
            element.classList.add('active');
        }

        // Live Cart State Modifications
        function addToCart() {
            const product = {
                id: "boraldo-tee-m1",
                name: document.getElementById('prodTitle').innerText,
                price: parseFloat(document.getElementById('prodPrice').innerText.replace('$', '')),
                size: selectedSize,
                color: selectedColor,
                img: document.getElementById('mainImage').src
            };

            cart.push(product);
            localStorage.setItem('threadlab_cart', JSON.stringify(cart));
            updateCartUI();
            showToast('Product added to cart!');
        }

        function updateCartUI() {
            document.getElementById('cartCountHeader').innerText = cart.length;

            const listContainer = document.getElementById('cartItemList');
            const totalContainer = document.getElementById('cartTotalPrice');
            const clearBtn = document.getElementById('clearCartBtn');

            listContainer.innerHTML = "";
            let totalPrice = 0;

            if (cart.length === 0) {
                listContainer.innerHTML = "<p style='color: #888;'>Your cart is currently empty.</p>";
                if (clearBtn) clearBtn.style.display = 'none';
            } else {
                if (clearBtn) clearBtn.style.display = 'block';
                cart.forEach((item, index) => {
                    totalPrice += item.price;
                    listContainer.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${item.name}</strong> <br>
                                <small>Size: ${item.size} | Color: ${item.color}</small>
                            </div>
                            <div>
                                <span>$${item.price.toFixed(2)}</span>
                                <span style="color: crimson; margin-left: 10px; cursor: pointer;" onclick="removeFromCart(${index})">&times;</span>
                            </div>
                        </div>
                    `;
                });
            }
            totalContainer.innerText = `$${totalPrice.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('threadlab_cart', JSON.stringify(cart));
            updateCartUI();
        }

        // Clear Entire Cart Feature
        function clearCart() {
            if (cart.length === 0) return;

            if (confirm("Are you sure you want to clear your entire cart?")) {
                cart = [];
                localStorage.removeItem('threadlab_cart');
                updateCartUI();
                showToast('Cart cleared successfully!');
            }
        }

        // Modal Controls
        function openCartModal() {
            document.getElementById('cartModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // মডাল ওপেন থাকলে পেছনের পেজ স্ক্রল হওয়া বন্ধ থাকবে
        }

        function closeCartModal() {
            document.getElementById('cartModal').style.display = 'none';
            document.body.style.overflow = 'auto';   // মডাল বন্ধ হলে মেইন পেজ আবার স্ক্রল করা যাবে
        }

        // Processing simulated client validation pipelines
        function processPayment(event) {
            event.preventDefault();
            if (cart.length === 0) {
                alert("Your cart is empty. Please add items to checkout.");
                return;
            }

            showToast("Processing payment...");

            setTimeout(() => {
                alert("Payment Successful! Thank you for ordering from Boraldo.");
                cart = [];
                localStorage.removeItem('threadlab_cart');
                updateCartUI();
                document.getElementById('paymentForm').reset();
                closeCartModal();
            }, 1500);
        }

        // Toast Messages Elements
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }
    </script>
</body>

</html>
